stages:
  ingest:
    cmd: python src/data_ingestion.py
    deps:
      - src/data_ingestion.py
      - params.yaml
    outs:
      - data/raw

  featurize:
    cmd: python src/feature_engineering.py
    deps:
      - src/feature_engineering.py
      - data/raw
      - params.yaml
    outs:
      - data/processed

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed
      - params.yaml
    outs:
      - models

  simulate:
    cmd: python src/simulate_live.py
    deps:
      - src/simulate_live.py
      - models
      - params.yaml
    outs:
      - data/simulation/prediction_log.csv