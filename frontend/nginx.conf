server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve pipeline page
    location = /pipeline {
        try_files /pipeline.html =404;
    }

    # All other routes serve index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}