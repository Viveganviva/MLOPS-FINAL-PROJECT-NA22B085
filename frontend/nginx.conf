server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 🔥 PROXY API REQUESTS
    location /predict {
        proxy_pass http://api:8000/predict;
    }

    location /health {
        proxy_pass http://api:8000/health;
    }

    location /ready {
        proxy_pass http://api:8000/ready;
    }

    location /prediction-history {
        proxy_pass http://api:8000/prediction-history;
    }

    location /pipeline-status {
        proxy_pass http://api:8000/pipeline-status;
    }

    location /service-health/ {
        proxy_pass http://api:8000/service-health/;
    }

    location /retrain {
        proxy_pass http://api:8000/retrain;
    }

    location /ground-truth {
        proxy_pass http://api:8000/ground-truth;
    }

    location /pipeline/ingest {
        proxy_pass http://api:8000/pipeline/ingest;
    }

    location /drift/ {
        proxy_pass http://api:8000/drift/;
    }

    # Serve pipeline page
    location = /pipeline {
        try_files /pipeline.html =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}